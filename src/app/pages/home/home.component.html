<!-- Hero Section -->
<section class="relative h-[500px] flex items-center overflow-hidden">
  <img
    src="https://static.vecteezy.com/system/resources/thumbnails/021/305/828/original/young-boy-playing-a-game-sitting-in-front-of-a-computer-wearing-headphones-playing-first-person-shooter-online-game-on-his-powerful-personal-computer-video.jpg"
    alt="Gamer playing at computer"
    class="absolute inset-0 w-full h-full object-cover"
  />
  <div class="absolute inset-0 bg-gradient-to-r from-black/90 via-black/60 to-transparent"></div>
  <div class="absolute inset-0 bg-gradient-to-b from-transparent via-transparent to-[#0f0f0f]"></div>
  <div class="relative z-10 px-10 max-w-2xl">
    <h1 class="text-5xl font-bold text-white mb-4 leading-tight">Log your favorite games</h1>
    <p class="text-lg ms-1 text-gray-300 leading-relaxed">
      GameLog allows you to put all your favorite games on a library, log your sessions and add your friends so the whole world can see what and how you play.
    </p>
    <div class="flex gap-3 mt-6">
      <a routerLink="/search" class="px-6 py-2.5 bg-purple-600 hover:bg-purple-700 text-white rounded-lg transition-colors font-medium">
        Browse Games
      </a>
      @if (!authenticated()) {
        <a routerLink="/login" class="px-6 py-2.5 border border-white/30 hover:bg-white/10 text-white rounded-lg transition-colors font-medium">
          Login
        </a>
      }
    </div>
  </div>
</section>

<div class="p-5">
  <app-game-grid title="Popular" mode="popular" [limit]="12" />
  <app-game-grid title="Adventure" mode="genre" [genreId]="31" [limit]="12" />
  <app-game-grid title="RPGs" mode="genre" [genreId]="32" [limit]="12" />
  <app-game-grid title="Fighting" mode="genre" [genreId]="4" [limit]="12" />
  <app-game-grid title="Racing" mode="genre" [genreId]="10" [limit]="12" />
</div>
