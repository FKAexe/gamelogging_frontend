<div class="min-h-screen flex items-center justify-center p-4">
  <div class="w-full max-w-md">
    <h1 class="text-3xl font-bold text-center mb-8">Login</h1>

    <form [formGroup]="loginForm" (ngSubmit)="login()" class="space-y-4">
      <!-- Email field -->
      <div>
        <label for="email" class="block text-sm font-medium text-gray-700 mb-1">
          Email
        </label>
        <input
          id="email"
          type="email"
          formControlName="email"
          class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500"
          [class.border-red-500]="loginForm.get('email')?.invalid && loginForm.get('email')?.touched"
        />
        @if (loginForm.get('email')?.invalid && loginForm.get('email')?.touched) {
          <p class="text-red-500 text-sm mt-1">Enter a valid email</p>
        }
      </div>

      <!-- Password field -->
      <div>
        <label for="password" class="block text-sm font-medium text-gray-700 mb-1">
          Password
        </label>
        <input
          id="password"
          type="password"
          formControlName="password"
          class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500"
          [class.border-red-500]="loginForm.get('password')?.invalid && loginForm.get('password')?.touched"
        />
        @if (loginForm.get('password')?.invalid && loginForm.get('password')?.touched) {
          <p class="text-red-500 text-sm mt-1">Password is required</p>
        }
      </div>

      <!-- Error message -->
      @if (errorMsg) {
        <p class="text-red-500 text-sm">{{ errorMsg }}</p>
      }

      <!-- Submit button -->
      <button
        type="submit"
        [disabled]="loading"
        class="w-full py-2 bg-purple-600 text-white rounded-lg hover:bg-purple-700 disabled:opacity-50 disabled:cursor-not-allowed"
      >
        {{ loading ? 'Logging in...' : 'Login' }}
      </button>
    </form>

    <!-- Register link -->
    <p class="text-center mt-6 text-gray-600">
      Don't have an account?
      <a routerLink="/register" class="text-purple-600 hover:underline">Register</a>
    </p>
  </div>
</div>
